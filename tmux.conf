set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

set -g renumber-windows on  # keep numbering sequential

# Options: start indexes from 1
set -g base-index 1
set -g pane-base-index 1

# Keybindings: split-windows
unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

# source-file/reload tmux file
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded ..."

# Keybindings: switch-session
unbind (
bind ä switch-client -n #enables you to swtich to next session

unbind )
bind ö switch-client -p #enables you to swtich to previouse session

#Keybindings; resize-panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi
bind-key m copy-mode
bind-key P paste-buffer
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# Keybindings: windows
bind -n C-Tab next-window
bind -n C-S-Tab previous-window

#open a popup scratchpad
bind -n M-g display-popup -E "tmux new-session -A -s RickJamesB"
bind-key N display-popup -E "nvim ~/notes/quick-note.md"


# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10


# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# Status Bar Styleing
set-option -g status-interval 1
set-option -g status-style bg=black
set-option -g status-style fg=white
set -g status-left ""
set -g status-right '%a%l:%M:%S %p#[default] #[fg=blue]%Y-%m-%d'
set-option -g status-justify absolute-centre


# list of tmux plugins
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'catppuccine/tmux'
set -g @themepack 'powerline/default/cyan'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
